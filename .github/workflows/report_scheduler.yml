name: Stock Report Automation (Every 3 Hours)

on:
  push:
    branches:
      - main
      - master
  schedule:
    # 3시간마다 정각에 실행 (UTC 기준)
    # 한국 시간(KST)은 UTC+9이므로, 아래 스케줄은 KST 기준 00:00, 03:00, 06:00, 09:00, 12:00, 15:00, 18:00, 21:00에 실행됩니다.
    - cron: '0 */3 * * *'
  # 수동 실행을 위한 설정
  workflow_dispatch:

concurrency:
  group: stock-report-${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      STOCK_DB_PATH: data/stock_project.db
      PIPELINE_RUN_INTERVAL_HOURS: "3"
      GEMINI_DAILY_REQUEST_BUDGET: "16"
      GEMINI_QUOTA_BLOCK_SECONDS: "300"

    steps:
      - name: 저장소 체크아웃 (Checkout Repository)
        uses: actions/checkout@v4

      - name: SQLite 저장 디렉토리 준비
        run: mkdir -p "$(dirname "$STOCK_DB_PATH")"

      - name: SQLite 캐시 복구
        id: sqlite-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ env.STOCK_DB_PATH }}
            ${{ env.STOCK_DB_PATH }}-shm
            ${{ env.STOCK_DB_PATH }}-wal
          key: stock-db-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            stock-db-${{ github.ref_name }}-

      - name: Python 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: uv 설치
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: 의존성 설치 (Install Dependencies)
        run: |
          # uv 환경 변수(bin) 경로 설정
          export PATH="$HOME/.cargo/bin:$PATH"
          uv sync --frozen

      - name: SQLite 런타임 상태 사전 점검
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          uv run python scripts/check_runtime_state.py --db-path "$STOCK_DB_PATH" --label "pre-run"

      - name: 리포트 생성 및 전송 파이프라인 실행
        env:
          # GitHub Secrets에 등록된 환경 변수들을 여기서 주입합니다.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash
          GEMINI_MODEL_CANDIDATES: gemini-2.5-flash,gemini-2.5-flash-lite,gemini-2.0-flash,gemini-2.0-flash-lite
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_PROMPT_DB_ID: ${{ secrets.NOTION_PROMPT_DB_ID }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_APP_PASSWORD: ${{ secrets.SENDER_APP_PASSWORD }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          REDDIT_ENABLED: "false"
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          uv run python -m src.main

      - name: SQLite 런타임 상태 사후 점검
        if: ${{ always() }}
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          uv run python scripts/check_runtime_state.py --db-path "$STOCK_DB_PATH" --label "post-run"

      - name: SQLite 캐시 저장
        if: ${{ always() && hashFiles('data/stock_project.db') != '' }}
        uses: actions/cache/save@v4
        with:
          path: |
            ${{ env.STOCK_DB_PATH }}
            ${{ env.STOCK_DB_PATH }}-shm
            ${{ env.STOCK_DB_PATH }}-wal
          key: ${{ steps.sqlite-cache-restore.outputs.cache-primary-key }}
