name: Daily Stock Report Scheduler

on:
  schedule:
    # 3시간 간격 실행 (원하는 시간에 맞춰 수정 가능)
    # UTC 기준이므로 한국시간(KST) - 9시간 = UTC
    # 아래 예시는 매일 자정, 3시, 6시, 9시 등 3시간마다 실행 (크론 표현식)
    - cron: "0 */3 * * *"

  # 수동 트리거 지원 (테스트용)
  workflow_dispatch:

jobs:
  run-report:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: uv 패키지 매니저 설치
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: 의존성 설치 및 캐싱
        run: |
          source $HOME/.local/bin/env
          uv sync

      - name: 주식 리포트 생성 및 발송 파이프라인 실행
        env:
          # Repository Secrets에 저장된 환경 변수 값을 등록
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_APP_PASSWORD: ${{ secrets.SENDER_APP_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ADMIN_TELEGRAM_CHAT_ID: ${{ secrets.ADMIN_TELEGRAM_CHAT_ID }}
        run: |
          source $HOME/.local/bin/env
          uv run python src/main.py
